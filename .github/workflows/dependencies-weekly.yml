name: Weekly Dependency Updates

on:
  schedule:
    - cron: '0 6 * * 1'  # 6 AM UTC every Monday
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Update type'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - pip
          - security-only
          - test-only

jobs:
  check-updates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
      update_count: ${{ steps.check.outputs.update_count }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pip-upgrader
        run: |
          pip install --upgrade pip
          pip install pip-upgrader pip-audit

      - name: Check for available updates
        id: check
        run: |
          echo "Checking for available package updates..."
          pip list --outdated --format=json > outdated.json

          UPDATE_COUNT=$(jq 'length' outdated.json)
          echo "update_count=$UPDATE_COUNT" >> $GITHUB_OUTPUT

          if [ "$UPDATE_COUNT" -gt 0 ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "Found $UPDATE_COUNT packages with updates:"
            jq -r '.[] | "  - \(.name): \(.version) → \(.latest_version)"' outdated.json
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "All packages are up to date"
          fi

      - name: Security audit
        if: inputs.update_type == 'all' || inputs.update_type == 'security-only'
        run: |
          pip-audit --format=json > security-audit.json || true
          pip-audit || true

      - name: Save update report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-reports
          path: |
            outdated.json
            security-audit.json
          retention-days: 14

  update-dependencies:
    runs-on: ubuntu-latest
    needs: check-updates
    if: needs.check-updates.outputs.has_updates == 'true'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Update dependencies
        run: |
          # Backup original requirements.txt
          cp requirements.txt requirements.txt.backup

          # Update packages
          if [ "${{ inputs.update_type }}" == "security-only" ]; then
            echo "Updating only security-critical packages..."
            # For now, update all - pip-audit would need more sophisticated logic
            pip install --upgrade $(cat requirements.txt)
          else
            echo "Updating all packages..."
            pip install --upgrade $(cat requirements.txt)
          fi

          # Generate updated requirements.txt
          pip freeze > requirements.new.txt

          # Keep only packages from original requirements
          grep -E "^$(cat requirements.txt.backup | sed 's/==/==|/g' | tr '|' '\n' | grep -v '^$' | paste -sd '|')" requirements.new.txt > requirements.txt

          # Show changes
          echo "Updated packages:"
          diff requirements.txt.backup requirements.txt || true

      - name: Test updated dependencies
        run: |
          echo "Testing updated dependencies..."
          pip install -r requirements.txt

          # Basic import tests
          python3 -c "from rag_database_hardened import RAGDatabaseHardened; print('✓ RAG database OK')"
          python3 -c "from rag_query_cache import QueryCache; print('✓ Query cache OK')"
          python3 -c "from rag_connection_pool import ConnectionPool; print('✓ Connection pool OK')"
          python3 -c "from rag_rrf_fusion import RRFSearcher; print('✓ RRF fusion OK')"
          python3 -c "from rag_performance_metrics import PerformanceMetrics; print('✓ Performance metrics OK')"

          # Quick functional test
          python3 << 'EOF'
          import tempfile
          import os
          from rag_database_hardened import RAGDatabaseHardened

          with tempfile.NamedTemporaryFile(suffix='.db', delete=False) as f:
              db_path = f.name

          try:
              rag = RAGDatabaseHardened(db_path)
              rag.connect()
              rag.add_document('test', 'Test content', 'test_1')
              results = rag.search('test', limit=1)
              assert len(results) > 0
              print("✓ Functional test passed")
          finally:
              if os.path.exists(db_path):
                  os.unlink(db_path)
          EOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: 'chore: Update dependencies (Weekly)'
          body: |
            ## 📦 Weekly Dependency Update

            This PR updates Python packages to their latest versions.

            ### Changes
            ```diff
            ${{ steps.update.outputs.changes }}
            ```

            ### Testing
            - ✅ All core modules import successfully
            - ✅ Basic functionality tests pass
            - ✅ Database operations work correctly

            ### Review Checklist
            - [ ] Review changelog for breaking changes
            - [ ] Test critical paths in your application
            - [ ] Verify performance metrics

            **Automated by GitHub Actions**
          branch: dependencies/update-${{ github.run_number }}
          commit-message: 'chore: update dependencies (weekly)'
          labels: |
            dependencies
            automated
          draft: false

  notify-no-updates:
    runs-on: ubuntu-latest
    needs: check-updates
    if: needs.check-updates.outputs.has_updates == 'false'

    steps:
      - name: Create comment in last dependency PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependencies,automated',
              sort: 'updated',
              direction: 'desc',
              per_page: 1
            });

            if (pulls.length > 0) {
              const pull = pulls[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pull.number,
                body: '🎉 No dependency updates needed this week! All packages are up to date.'
              });
            }
