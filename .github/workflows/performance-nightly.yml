name: Nightly Performance Tests

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC daily
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Performance test type'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - benchmark
          - regression
          - profiling

jobs:
  performance-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-benchmark pytest-profiling matplotlib

      - name: Run Performance Benchmarks
        if: inputs.test_type == 'all' || inputs.test_type == 'benchmark'
        run: |
          python3 -c "
          import time
          import json
          from rag_database_hardened import RAGDatabaseHardened

          print('Running performance benchmarks...')

          # Initialize RAG
          rag = RAGDatabaseHardened('benchmark.db')
          rag.connect()

          # Test 1: Search latency
          start = time.time()
          results = rag.search('database setup', limit=5)
          search_time = (time.time() - start) * 1000

          # Test 2: Document insertion
          start = time.time()
          for i in range(100):
              rag.add_document(
                  namespace='benchmark',
                  content=f'Test document {i} with some content for search testing',
                  source_id=f'test_{i}'
              )
          insert_time = (time.time() - start) * 1000

          # Test 3: Batch search
          queries = ['test', 'document', 'search'] * 3
          start = time.time()
          for query in queries:
              rag.search(query, limit=5)
          batch_time = (time.time() - start) * 1000

          benchmark_results = {
              'search_latency_ms': round(search_time, 2),
              'insert_100_docs_ms': round(insert_time, 2),
              'batch_10_searches_ms': round(batch_time, 2),
              'search_throughput_ops_per_sec': round(1000 / (search_time + 0.01), 2),
              'insert_throughput_ops_per_sec': round(100 / (insert_time / 1000 + 0.01), 2)
          }

          with open('benchmark-results.json', 'w') as f:
              json.dump(benchmark_results, f, indent=2)

          print('Benchmark Results:')
          print(json.dumps(benchmark_results, indent=2))
          "

      - name: Check for Performance Regression
        if: inputs.test_type == 'all' || inputs.test_type == 'regression'
        run: |
          python3 -c "
          import json
          import requests

          # Load current results
          with open('benchmark-results.json', 'r') as f:
              current = json.load(f)

          # Load baseline from previous run (or defaults)
          baseline = {
              'search_latency_ms': 150.0,
              'insert_100_docs_ms': 5000.0,
              'batch_10_searches_ms': 1500.0
          }

          # Check for regression (> 10% slower)
          regressions = []
          for metric, value in current.items():
              if metric in baseline:
                  baseline_val = baseline[metric]
                  if value > baseline_val * 1.10:  # 10% regression threshold
                      regressions.append({
                          'metric': metric,
                          'baseline': baseline_val,
                          'current': value,
                          'regression_pct': round((value - baseline_val) / baseline_val * 100, 2)
                      })

          # Save report
          report = {
              'current': current,
              'baseline': baseline,
              'regressions': regressions,
              'has_regression': len(regressions) > 0
          }

          with open('regression-report.json', 'w') as f:
              json.dump(report, f, indent=2)

          if regressions:
              print('🚨 PERFORMANCE REGRESSION DETECTED:')
              for r in regressions:
                  print(f\"  - {r['metric']}: {r['regression_pct']}% slower\")
              exit(1)
          else:
              print('✅ No performance regression detected')
          "
        continue-on-error: true

      - name: Run Profiling
        if: inputs.test_type == 'all' || inputs.test_type == 'profiling'
        run: |
          python3 -c "
          import cProfile
          import pstats
          import io
          from rag_database_hardened import RAGDatabaseHardened

          rag = RAGDatabaseHardened('profile.db')
          rag.connect()

          # Profile search operation
          profiler = cProfile.Profile()
          profiler.enable()

          for i in range(50):
              rag.search('database query', limit=5)

          profiler.disable()

          # Save profiling results
          s = io.StringIO()
          ps = pstats.Stats(profiler, stream=s).sort_stats('cumulative')
          ps.print_stats(20)  # Top 20 functions

          with open('profiling-report.txt', 'w') as f:
              f.write(s.getvalue())

          print('Profiling complete - top 20 hot paths saved to profiling-report.txt')
          "

      - name: Upload Performance Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-reports
          path: |
            benchmark-results.json
            regression-report.json
            profiling-report.txt
          retention-days: 30

      - name: Generate Performance Summary
        if: always()
        run: |
          echo "# ⚡ Nightly Performance Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f benchmark-results.json ]; then
              echo "## 📊 Benchmark Results" >> $GITHUB_STEP_SUMMARY
              echo '```json' >> $GITHUB_STEP_SUMMARY
              cat benchmark-results.json >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f regression-report.json ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "## 📉 Regression Check" >> $GITHUB_STEP_SUMMARY
              echo '```json' >> $GITHUB_STEP_SUMMARY
              cat regression-report.json >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  performance-history:
    runs-on: ubuntu-latest
    needs: performance-tests
    if: always()

    steps:
      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          name: performance-reports

      - name: Store performance data
        run: |
          if [ -f benchmark-results.json ]; then
            # Store in workflow run data
            echo "PERFORMANCE_METRICS=$(cat benchmark-results.json)" >> $GITHUB_OUTPUT

            # Check if we need to update baseline
            if [ -f regression-report.json ]; then
              HAS_REGRESSION=$(jq -r '.has_regression' regression-report.json)
              if [ "$HAS_REGRESSION" != "true" ]; then
                echo "📈 Performance improved or stable - consider updating baseline"
              fi
            fi
          fi
        id: metrics

      - name: Create issue on regression
        if: failure() && needs.performance-tests.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Performance Regression Detected - ' + new Date().toISOString().split('T')[0],
              body: 'Nightly performance tests detected a regression of more than 10%.\n\nPlease review workflow run: ' + context.payload.repository.html_url + '/actions/runs/' + context.runId,
              labels: ['performance', 'regression']
            })
