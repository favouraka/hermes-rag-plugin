name: Nightly Security Scan

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Scan type to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - safety
          - bandit
          - semgrep

jobs:
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        scan:
          - safety
          - bandit
          - semgrep

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit[toml] semgrep

      - name: Run Safety (dependency vulnerabilities)
        if: matrix.scan == 'safety' || (inputs.scan_type == 'all' || inputs.scan_type == 'safety')
        run: |
          safety check --json > safety-report.json || true
          safety check --full-report || true
        continue-on-error: true

      - name: Run Bandit (static analysis)
        if: matrix.scan == 'bandit' || (inputs.scan_type == 'all' || inputs.scan_type == 'bandit')
        run: |
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . || true
        continue-on-error: true

      - name: Run Semgrep (SAST)
        if: matrix.scan == 'semgrep' || (inputs.scan_type == 'all' || inputs.scan_type == 'semgrep')
        run: |
          semgrep --config=auto --json --output=semgrep-report.json || true
          semgrep --config=auto || true
        continue-on-error: true

      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ matrix.scan }}
          path: |
            safety-report.json
            bandit-report.json
            semgrep-report.json
          retention-days: 30

  security-summary:
    runs-on: ubuntu-latest
    needs: security-scan
    if: always()

    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Generate Summary
        run: |
          echo "# 🔒 Nightly Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Safety
          if [ -f reports/security-reports-safety/safety-report.json ]; then
            echo "## 📦 Safety (Dependency Vulnerabilities)" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat reports/security-reports-safety/safety-report.json | head -c 5000 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          # Bandit
          if [ -f reports/security-reports-bandit/bandit-report.json ]; then
            echo "## 🔍 Bandit (Static Analysis)" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat reports/security-reports-bandit/bandit-report.json | head -c 5000 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          # Semgrep
          if [ -f reports/security-reports-semgrep/semgrep-report.json ]; then
            echo "## 🛡️ Semgrep (SAST)" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat reports/security-reports-semgrep/semgrep-report.json | head -c 5000 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create issue on critical findings
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Security Scan Failed - ' + new Date().toISOString().split('T')[0],
              body: 'Nightly security scan detected critical vulnerabilities.\n\nPlease review the workflow run: ' + context.payload.repository.html_url + '/actions/runs/' + context.runId,
              labels: ['security', 'critical']
            })
